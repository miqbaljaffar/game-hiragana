<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana Spin Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ff4757; }
        .stats {
            display: flex;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2f3542;
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 20px auto;
        }
        canvas {
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #2f3542;
            z-index: 10;
        }
        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #1e90ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #3742fa; }
        button:disabled { background-color: #ced6e0; cursor: not-allowed; }
        
        #result-area {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        #hiragana-display {
            font-size: 5rem;
            margin: 10px 0;
            color: #ff4757;
        }
    </style>
</head>
<body>

    <h1>Hiragana Spin Game</h1>
    
    <div class="stats">
        <div id="spin-counter">Spin: 0 / 20</div>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelcanvas" width="300" height="300"></canvas>
    </div>

    <button id="spin-btn" onclick="spin()">Putar Roda!</button>

    <div id="result-area">
        <div style="font-size: 1.2rem; font-weight: bold;">Huruf terpilih:</div>
        <div id="hiragana-display">あ</div>
        <br>
        <button id="next-btn" onclick="nextSpin()">Lanjut Spin</button>
    </div>

    <script>
        // Data lengkap Hiragana (Gojuon, Dakuten, Handakuten, Yoon) - Tanpa Romaji
        const hiraganaData = [
            "あ", "い", "う", "え", "お", "か", "き", "く", "け", "こ",
            "さ", "し", "す", "せ", "そ", "た", "ち", "つ", "て", "と",
            "な", "に", "ぬ", "ね", "の", "は", "ひ", "ふ", "へ", "ほ",
            "ま", "み", "む", "め", "も", "や", "ゆ", "よ",
            "ら", "り", "る", "れ", "ろ", "わ", "を", "ん",
            "が", "ぎ", "ぐ", "げ", "ご", "ざ", "じ", "ず", "ぜ", "ぞ",
            "だ", "ぢ", "づ", "で", "ど", "ば", "び", "ぶ", "べ", "ぼ",
            "ぱ", "ぴ", "ぷ", "ぺ", "ぽ",
            "きゃ", "きゅ", "きょ", "しゃ", "しゅ", "しょ",
            "ちゃ", "ちゅ", "ちょ", "にゃ", "にゅ", "にょ",
            "ひゃ", "ひゅ", "ひょ", "みゃ", "みゅ", "みょ",
            "りゃ", "りゅ", "りょ", "ぎゃ", "ぎゅ", "ぎょ",
            "じゃ", "じゅ", "じょ", "びゃ", "びゅ", "びょ",
            "ぴゃ", "ぴゅ", "ぴょ"
        ];

        let currentSlices = [];
        let spinCount = 0;
        const maxSpins = 20;

        const colors = ["#ff9ff3", "#feca57", "#ff6b6b", "#48dbfb", "#1dd1a1", "#f368e0", "#ff9f43", "#ee5253", "#0abde3", "#10ac84"];
        
        let startAngle = 0;
        let arc;
        let spinTimeout = null;
        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;

        const canvas = document.getElementById("wheelcanvas");
        const ctx = canvas.getContext("2d");

        // Memilih 10 huruf acak untuk roda
        function getRandomSlices() {
            let shuffled = hiraganaData.sort(() => 0.5 - Math.random());
            return shuffled.slice(0, 10);
        }

        function drawRouletteWheel() {
            if (currentSlices.length === 0) currentSlices = getRandomSlices();
            arc = Math.PI / (currentSlices.length / 2);
            ctx.clearRect(0, 0, 300, 300);

            for (let i = 0; i < currentSlices.length; i++) {
                let angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];

                ctx.beginPath();
                ctx.arc(150, 150, 150, angle, angle + arc, false);
                ctx.arc(150, 150, 0, angle + arc, angle, true);
                ctx.fill();

                ctx.save();
                ctx.fillStyle = "black";
                ctx.translate(150 + Math.cos(angle + arc / 2) * 110, 
                              150 + Math.sin(angle + arc / 2) * 110);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                let text = currentSlices[i];
                ctx.font = 'bold 26px Arial';
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            }
        }

        function spin() {
            if (spinCount >= maxSpins) {
                alert("Game Selesai! Kamu sudah memutar roda 20 kali.");
                return;
            }
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("result-area").style.display = "none";
            
            spinAngleStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4000;
            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawRouletteWheel();
            spinTimeout = setTimeout(rotateWheel, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            let degrees = startAngle * 180 / Math.PI + 90;
            let arcd = arc * 180 / Math.PI;
            let index = Math.floor((360 - degrees % 360) / arcd);
            
            let winner = currentSlices[index];
            spinCount++;
            document.getElementById("spin-counter").innerText = `Spin: ${spinCount} / ${maxSpins}`;
            
            showResult(winner);
        }

        function easeOut(t, b, c, d) {
            let ts = (t /= d) * t;
            let tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        function showResult(winner) {
            document.getElementById("result-area").style.display = "block";
            document.getElementById("hiragana-display").innerText = winner;
            
            let nextBtn = document.getElementById("next-btn");
            if (spinCount < maxSpins) {
                nextBtn.innerText = "Lanjut Spin Berikutnya";
                nextBtn.onclick = nextSpin;
            } else {
                nextBtn.innerText = "Game Selesai (Main Lagi)";
                nextBtn.onclick = resetGame;
            }
        }

        function nextSpin() {
            currentSlices = getRandomSlices(); // Ambil 10 huruf baru
            drawRouletteWheel();
            document.getElementById("result-area").style.display = "none";
            document.getElementById("spin-btn").disabled = false;
        }

        function resetGame() {
            spinCount = 0;
            document.getElementById("spin-counter").innerText = `Spin: 0 / ${maxSpins}`;
            nextSpin();
        }

        // Jalankan awal roda
        window.onload = drawRouletteWheel;
    </script>
</body>
</html>
